services:
  finance:
    image: python:3.11-slim
    working_dir: /app
    command: bash -lc "pip install -r requirements.txt && streamlit run app.py --server.port=8501 --server.address=0.0.0.0"
    expose:
      - "8501"
    volumes:
      - ./app.py:/app/app.py
      - ./requirements.txt:/app/requirements.txt
      - ./engine:/app/engine
      - ./modulos:/app/modulos
      - ./static:/app/static
      - ./_local_data:/app/data
      - ./_local_backup:/app/backup
    environment:
      - TZ=America/Sao_Paulo
      - FIN_DATA_DIR=/app/data
      - FIN_BACKUP_DIR=/app/backup
      - FIN_LOCALE=pt_BR
      - BRAPI_TOKEN=xoeoQ1NL9n8bEFPycdFSDV
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./static:/usr/share/nginx/html/static
    depends_on:
      - finance
    restart: unless-stopped
